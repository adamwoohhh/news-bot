name: Release

on:
  workflow_dispatch:
    inputs:
      debug:
        description: "Enable debug mode"
        type: boolean
        default: false
        required: false
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Debug with tmate
        if: ${{ inputs.debug == 'true' }}
        uses: mxschmitt/action-tmate@v3

  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --registry https://registry.npmjs.org/ --frozen-lockfile --prefer-offline --network-timeout 60000
        continue-on-error: false
        timeout-minutes: 10

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build release binaries
        run: |
          bun run build:darwin-arm64
          bun run build:darwin-x64
          bun run build:linux-arm64
          bun run build:linux-x64
          bun run build:windows-x64

      - name: Generate checksums
        run: |
          cd dist
          sha256sum news-bot-* > checksums.txt

      - name: Copy install script
        run: cp scripts/install.sh dist/install.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/news-bot-darwin-arm64
            dist/news-bot-darwin-x64
            dist/news-bot-linux-arm64
            dist/news-bot-linux-x64
            dist/news-bot-windows-x64.exe
            dist/checksums.txt
            dist/install.sh
